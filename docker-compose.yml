# See https://docs.docker.com/reference/compose-file/extension
x-networks: &networks
  networks:
    - ac-network

x-ac-shared-conf: &ac-shared-conf
  <<: *networks
  working_dir: /azerothcore
  depends_on:
    ac-database:
      condition: service_healthy

services:
  ac-database:
    <<: *networks
    image: mysql:8.0
    restart: unless-stopped
    cap_add:
      - SYS_NICE # CAP_SYS_NICE
    ports:
      - ${DOCKER_DB_EXTERNAL_PORT:-63306}:3306
    expose:
      - 3306
    environment:
      - MYSQL_ROOT_PASSWORD=${DOCKER_DB_ROOT_PASSWORD:-password}
    volumes:
      - type: volume
        source: ac-database
        target: /var/lib/mysql
    healthcheck:
      test: '/usr/bin/mysql --user=root --password=$$MYSQL_ROOT_PASSWORD --execute "SHOW DATABASES;"'
      interval: 2s
      timeout: 40s
      retries: 20


  ac-module-sql-import:
    <<: *networks
    image: ghcr.io/robixxu/venom-acore:latest
    user: root
    restart: "no"
    depends_on:
      ac-database:
        condition: service_healthy
    environment:
      MYSQL_PWD: "${DOCKER_DB_ROOT_PASSWORD:-password}"
      MODULE_SQL_IMPORT_MARKER: "module-sql-import-v3"
    command:
      - sh
      - -c
      - |
        set -eu

        mysql_exec() {
          mysql -hac-database -uroot "$@"
        }

        import_dir() {
          db="$1"
          dir="$2"

          if [ ! -d "$dir" ]; then
            return 0
          fi

          find "$dir" -type f -name "*.sql" | sort | while read -r f; do
            echo "Importing $f -> $db"
            mysql_exec "$db" < "$f"
          done
        }

        echo "Creating module import marker table..."
        mysql_exec acore_world -e "
          CREATE TABLE IF NOT EXISTS venom_module_imports (
            name VARCHAR(100) PRIMARY KEY,
            imported_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );
        "

        if mysql_exec acore_world -N -e "SELECT name FROM venom_module_imports WHERE name='${MODULE_SQL_IMPORT_MARKER}';" | grep -q "${MODULE_SQL_IMPORT_MARKER}"; then
          echo "Module SQL already imported for marker ${MODULE_SQL_IMPORT_MARKER}. Skipping."
          exit 0
        fi

        echo "Creating PlayerBots database..."
        mysql_exec -e "CREATE DATABASE IF NOT EXISTS acore_playerbots DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

        echo "Importing module SQL..."

        for module in /src/modules/*; do
          [ -d "$module" ] || continue
          echo "Scanning module: $module"

          # world DB
          import_dir acore_world "$module/data/sql/world"
          import_dir acore_world "$module/data/sql/world/base"
          import_dir acore_world "$module/data/sql/world/updates"
          import_dir acore_world "$module/data/sql/db-world"

          # characters DB
          import_dir acore_characters "$module/data/sql/characters"
          import_dir acore_characters "$module/data/sql/characters/base"
          import_dir acore_characters "$module/data/sql/characters/updates"
          import_dir acore_characters "$module/data/sql/db-characters"

          # auth DB
          import_dir acore_auth "$module/data/sql/auth"
          import_dir acore_auth "$module/data/sql/auth/base"
          import_dir acore_auth "$module/data/sql/auth/updates"
          import_dir acore_auth "$module/data/sql/db-auth"

          # PlayerBots own DB
          import_dir acore_playerbots "$module/data/sql/playerbots"
          import_dir acore_playerbots "$module/data/sql/playerbots/base"
          import_dir acore_playerbots "$module/data/sql/playerbots/updates"
        done

        mysql_exec acore_world -e "INSERT INTO venom_module_imports (name) VALUES ('${MODULE_SQL_IMPORT_MARKER}');"

        echo "Module SQL import complete."

  ac-worldserver:
    container_name: acore-docker-ac-worldserver-1 # fixed container name to simplify the attach process
    <<: *ac-shared-conf
    stdin_open: true
    tty: true
    cap_add:
      - SYS_NICE # CAP_SYS_NICE
    image: ghcr.io/robixxu/venom-acore:latest
    command: ["/azerothcore/env/dist/bin/worldserver"]
    restart: unless-stopped
    privileged: true
    user: ${DOCKER_USER:-acore}
    ports:
      - ${DOCKER_WORLD_EXTERNAL_PORT:-8085}:8085
      - ${DOCKER_SOAP_EXTERNAL_PORT:-7878}:7878
    expose:
      - 8085
    volumes:
      - "${DOCKER_VOL_CLIENT_DATA:-/root/config/wow}/scripts/lua:/azerothcore/env/dist/bin/lua_scripts/scripts"
      - "${DOCKER_VOL_CLIENT_DATA:-/root/config/wow}:/azerothcore/env/dist/data:ro"
      - "${DOCKER_VOL_CLIENT_DATA:-/root/config/wow}/config/etc:/azerothcore/env/dist/etc"

    environment:
      AC_DATA_DIR: "/azerothcore/env/dist/data"
      AC_LOGS_DIR: "/azerothcore/env/dist/logs"
      AC_LOGIN_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_auth"
      AC_WORLD_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_world"
      AC_CHARACTER_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_characters"
      AC_PLAYERBOTS_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_playerbots"
      AC_CLOSE_IDLE_CONNECTIONS: "0"
      AC_UPDATES_ENABLE_DATABASES: "1"
    depends_on:
      #ac-eluna-ts-dev:
        #condition: service_started
      ac-database:
        condition: service_healthy
      ac-module-sql-import:
        condition: service_completed_successfully
      ac-client-data:
        condition: service_completed_successfully
      #ac-db-import:
        #condition: service_completed_successfully

  ac-authserver:
    <<: *ac-shared-conf
    tty: true
    image: ghcr.io/robixxu/venom-acore:latest
    command: ["/azerothcore/env/dist/bin/authserver"]
    restart: unless-stopped
    ports:
      - ${DOCKER_AUTH_EXTERNAL_PORT:-3724}:3724
    expose:
      - 3724
    volumes:
      - "${DOCKER_VOL_CLIENT_DATA:-/root/config/wow}/config/etc:/azerothcore/env/dist/etc"
    environment:
      AC_LOGS_DIR: "/azerothcore/env/dist/logs"
      AC_TEMP_DIR: "/azerothcore/env/dist/temp"
      AC_LOGIN_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_auth"
      AC_SQLDRIVER_LOG_FILE: "SQLDriver.log"
      AC_SQLDRIVER_QUERY_LOGGING: "1"
      AC_UPDATES_ENABLE_DATABASES: "1"
    depends_on:
      ac-database:
        condition: service_healthy
      #ac-db-import:
        #condition: service_completed_successfully

  ac-eluna-ts-dev:
    profiles:
      - disabled
    image: acore/eluna-ts:master
    # the build:lib is done in the healthcheck
    command: sh -c "cd /eluna-ts/modules && touch index.ts && npm install && cd /eluna-ts && npm run dev"
    # small workaround to make the other services to wait for the eluna-ts build
    healthcheck:
      test: sh -c "cd /eluna-ts/modules/eluna-ts && npm run build:lib && npm run build"
      timeout: 60s
      retries: 10
      interval: 5s
      start_period: 10s
    restart: unless-stopped
    volumes:
      # from typescript
      - ./scripts/typescript:/eluna-ts/modules
      # to lua
      - ./scripts/lua:/eluna-ts/dist/

  ac-client-data:
    <<: *networks
    image: acore/ac-wotlk-client-data:${DOCKER_IMAGE_TAG:-master}
    volumes:
      - "${DOCKER_VOL_CLIENT_DATA:-ac-client-data}:/azerothcore/env/dist/data"

  ac-db-import:
    profiles:
      - disabled
    <<: *ac-shared-conf
    image: acore/ac-wotlk-db-import:${DOCKER_IMAGE_TAG:-master}
    environment:
      AC_DISABLE_INTERACTIVE: "1"
      AC_DATA_DIR: "/azerothcore/env/dist/data"
      AC_LOGS_DIR: "/azerothcore/env/dist/logs"
      AC_LOGIN_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_auth"
      AC_WORLD_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_world"
      AC_CHARACTER_DATABASE_INFO: "ac-database;3306;root;${DOCKER_DB_ROOT_PASSWORD:-password};acore_characters"
      AC_CLOSE_IDLE_CONNECTIONS: "0"
      AC_UPDATES_ENABLE_DATABASES: "0"
    depends_on:
      ac-database:
        condition: service_healthy

  phpmyadmin:
    <<: *networks
    image: phpmyadmin
    ports:
      - 8080:80
    environment:
      - PMA_ARBITRARY=1
    profiles: []

volumes:
  ac-database:
  ac-client-data:

networks:
  ac-network:
